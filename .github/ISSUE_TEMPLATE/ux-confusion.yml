name: UX confusion
description: Report confusing command output, language or flow.
title: "[UX]: "
labels: ["ux", "portuguese"]
body:
  - type: dropdown
    id: profile
    attributes:
      label: User profile
      options:
        - Non-Technical Builder
        - Vibe Coder
        - Professional Engineer
        - Other
  - type: input
    id: command
    attributes:
      label: Command or screen
  - type: textarea
    id: confusion
    attributes:
      label: What was confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
